name: Build and Upload to S3

on:
  push:
    branches:
      - main
      - develop

jobs:
  build_and_upload:
    runs-on: ubuntu-latest

    env:
      S3_BUCKET: sample-test-bucket-3434

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OPTIONAL: if your repo is Node-based, keep this section.
      # If not, you can remove Node steps and only keep the S3 upload part.
      - name: Setup Node (optional)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install (optional)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping npm install"
          fi
      - name: Build (optional)
        run: |
          if [ -f package.json ]; then
            npm run build --if-present
          else
            echo "No package.json found, skipping build"
          fi

      # Create a sample artifact folder if your build doesn't create one yet
      - name: Prepare upload folder (dist/)
        run: |
          mkdir -p dist
          echo "Hello from GitHub Actions" > dist/hello.txt
          echo "Branch: ${GITHUB_REF_NAME}" >> dist/hello.txt
          echo "Commit: ${GITHUB_SHA}" >> dist/hello.txt
          echo "Build time (UTC): $(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> dist/hello.txt
          ls -la dist

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload dist/ to S3 (per-branch path)
        run: |
          echo "Uploading dist/ to s3://${S3_BUCKET}/${GITHUB_REF_NAME}/"
          aws s3 sync dist/ "s3://${S3_BUCKET}/${GITHUB_REF_NAME}/" --delete

      - name: Verify upload (list S3 objects)
        run: |
          aws s3 ls "s3://${S3_BUCKET}/${GITHUB_REF_NAME}/" --recursive
